<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Verification Code</title>
  <style>
    /* Mobile-first responsive styles */
    @media only screen and (max-width: 480px) {
      .container {
        padding: 32px 16px !important;
      }
      .card-content {
        padding: 32px 20px !important;
      }
      .otp-code {
        font-size: 32px !important;
        letter-spacing: 4px !important;
        padding: 10px 16px !important;
      }
      .title {
        font-size: 24px !important;
      }
      .trust-badge {
        padding: 10px 14px !important;
      }
      .footer {
        padding: 14px 20px !important;
      }
    }
    
    @media only screen and (max-width: 360px) {
      .otp-code {
        font-size: 26px !important;
        letter-spacing: 3px !important;
        padding: 8px 12px !important;
      }
      .card-content {
        padding: 28px 16px !important;
      }
    }
    
    /* iOS Safari fixes */
    @supports (-webkit-touch-callout: none) {
      .card {
        width: 100%;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background: linear-gradient(135deg, #181919 0%, #edf2f7 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

<div class="container" style="max-width: 100%; padding: 48px 20px; margin: 0 auto; background: linear-gradient(135deg, #181919 0%, #edf2f7 100%);">
  <div style="max-width: 480px; width: 100%; margin: 0 auto; table-layout: fixed;">
    
    <!-- Main Card -->
    <div class="card" style="background: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02); width: 100%;">
      
      <!-- Top Accent Bar (Gradient) -->
      <div style="height: 4px; background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);"></div>
      
      <!-- Content Area -->
      <div class="card-content" style="padding: 40px 32px 36px; text-align: center;">
        
        <!-- Icon / Logo Area -->
        <div style="display: inline-block; margin-bottom: 24px;">
          <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 32px; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 8px 16px -4px rgba(102, 126, 234, 0.3);">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <path d="M2 17L12 22L22 17" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <path d="M2 12L12 17L22 12" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
        </div>

        <!-- Title -->
        <h2 class="title" style="color: #1a202c; font-size: 26px; margin: 0 0 8px; font-weight: 700; letter-spacing: -0.3px; word-break: keep-all;">Verification Code</h2>
        <p style="color: #4a5568; font-size: 14px; margin: 0 0 28px; line-height: 1.5;">Use this one-time password to complete your action.</p>

        <!-- OTP Code Box -->
        <div style="background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border-radius: 16px; padding: 20px 16px; margin: 0 0 20px; border: 1px solid #e2e8f0; width: auto;">
          <div style="background: #ffffff; border-radius: 12px; padding: 12px 20px; display: inline-block; border: 1px solid #e2e8f0; width: auto; max-width: 100%; box-sizing: border-box;">
            <span class="otp-code" style="font-family: 'Courier New', Courier, monospace; font-size: 44px; font-weight: 800; color: #1e293b; letter-spacing: 8px; display: inline-block; word-break: break-all; word-wrap: break-word;">
              {$otp_code}
            </span>
          </div>
        </div>

        <!-- Trust Badge -->
        <div class="trust-badge" style="background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 12px 16px; margin: 24px 0 16px; display: inline-block; width: auto;">
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin: 0 auto;">
            <tr>
              <td style="padding-right: 10px; vertical-align: middle;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </td>
              <td style="font-size: 12px; color: #166534; font-weight: 500; vertical-align: middle;">Secure & encrypted</td>
            </tr>
          </table>
        </div>

        <!-- Expiry Notice -->
        <p style="color: #64748b; font-size: 12px; margin: 16px 0 0; line-height: 1.6;">
          🔒 This code is valid for <strong style="color: #dc2626;">5 minutes</strong>.<br>
          If you didn't request this code, you can safely ignore this email.
        </p>

      </div>

      <!-- Simple Footer -->
      <div class="footer" style="background: #fafafa; padding: 16px 32px; border-top: 1px solid #f1f5f9; text-align: center;">
  <p style="margin: 0; font-size: 11px; color: #94a3b8;">Automated message — please do not reply &nbsp;|&nbsp; ✨ Designed by <strong style="color: #6366f1;">Vercodea</strong></p>
</div>

    </div>
  </div>
</div>

</body>
</html>
